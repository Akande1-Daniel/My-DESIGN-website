[build]
  publish = "Front end"
  functions = "netlify/functions"

  # You can also set sensitive SMTP values in Netlify Site settings instead of in this file.
  # Uncomment and replace the placeholders below only if you want to store them in netlify.toml.
  # SMTP_HOST = "smtp.gmail.com"
  # SMTP_PORT = "587"
  # SMTP_SECURE = "false"
  # SMTP_USER = "your-email@gmail.com"
  # SMTP_PASS = "your-smtp-password"
  # EMAIL_TO = "your-email@gmail.com"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true
