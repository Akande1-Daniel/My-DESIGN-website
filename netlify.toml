[build]
  publish = "Front end"
  functions = "netlify/functions"

[build.environment]
  # Replace these placeholder values with your real SMTP credentials.
  SMTP_HOST = "smtp.gmail.com"
  SMTP_PORT = "587"
  SMTP_SECURE = "false"
  SMTP_USER = "your-email@gmail.com"
  SMTP_PASS = "your-smtp-password"
  EMAIL_TO = "your-email@gmail.com"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true
